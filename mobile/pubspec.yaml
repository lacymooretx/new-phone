name: new_phone_mobile
description: New Phone PBX mobile client.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  go_router: ^13.0.0
  json_annotation: ^4.8.1
  flutter_webrtc: ^0.12.0
  sip_ua: ^0.8.0
  flutter_callkeep: ^0.4.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  just_audio: ^0.9.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
