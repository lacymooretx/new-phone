<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Minimal geometric "connect" mark: two overlapping rounded shapes forming a link -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#g1)"/>
  <!-- Abstract "C" / connection: two arcs that interlock -->
  <path d="M20 9.5a6.5 6.5 0 0 0-6.5 6.5 6.5 6.5 0 0 0 6.5 6.5" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M12 9.5a6.5 6.5 0 0 1 6.5 6.5 6.5 6.5 0 0 1-6.5 6.5" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Center connection dot -->
  <circle cx="16" cy="16" r="2" fill="white"/>
</svg>
