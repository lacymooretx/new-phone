name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Every Sunday at midnight UTC
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  python-sast:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (JSON report)
        run: >
          bandit -r api/src/ ai-engine/src/
          -c .bandit.yml
          -f json
          -o bandit-results.json
          || true

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json
          retention-days: 30

      - name: Run bandit (strict — fails on issues)
        run: bandit -r api/src/ ai-engine/src/ -c .bandit.yml

  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { dir: web, name: Web }
          - { dir: desktop, name: Desktop }
          - { dir: extension, name: Extension }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.package.dir }}/package-lock.json

      - name: Install dependencies
        run: cd ${{ matrix.package.dir }} && npm ci

      - name: Audit (${{ matrix.package.name }}) — report all high+
        run: cd ${{ matrix.package.dir }} && npm audit --audit-level=high || true

      - name: Audit (${{ matrix.package.name }}) — fail on critical
        run: cd ${{ matrix.package.dir }} && npm audit --audit-level=critical

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - { dir: api, tag: new-phone-api }
          - { dir: web, tag: new-phone-web }
          - { dir: ai-engine, tag: new-phone-ai-engine }
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t ${{ matrix.image.tag }}:scan -f ${{ matrix.image.dir }}/Dockerfile ${{ matrix.image.dir }}

      - name: Trivy scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.tag }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.tag }}:scan
          format: sarif
          output: trivy-${{ matrix.image.tag }}.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.tag }}.sarif
          category: trivy-${{ matrix.image.tag }}

  secret-detection:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
