global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: default-webhook
  routes:
    - match:
        severity: critical
      receiver: default-webhook
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: default-webhook
      repeat_interval: 30m

receivers:
  - name: default-webhook
    webhook_configs:
      - url: http://api:8000/api/v1/webhooks/alerts
        send_resolved: true
    # Uncomment and configure for email alerts:
    # email_configs:
    #   - to: 'ops@example.com'
    #     from: 'alertmanager@newphone.local'
    #     smarthost: 'mailhog:1025'
    #     require_tls: false

templates: []
