server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576  # 1MB
    timeout: 10s

scrape_configs:
  # Scrape Docker container logs via the Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=new-phone"]
    relabel_configs:
      # Use the container name as the primary label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: "container"
      # Extract the compose service name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # Extract the compose project name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
      # Use container ID for deduplication
      - source_labels: ["__meta_docker_container_id"]
        target_label: "container_id"
    pipeline_stages:
      # Try to parse JSON logs (FastAPI/structlog output)
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            timestamp: timestamp
      # Fall back: extract log level from plain text
      - regex:
          expression: "^(?P<timestamp>\\S+)\\s+(?P<level>\\w+)\\s+(?P<message>.*)$"
      # Set extracted level as a label
      - labels:
          level:
      # Use extracted timestamp if available
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.000Z"
            - "2006-01-02 15:04:05,000"
          action_on_failure: fudge
      # Add static labels for easier filtering
      - static_labels:
          cluster: "new-phone"
