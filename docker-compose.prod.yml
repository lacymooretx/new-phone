# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
name: new-phone

services:
  # ─── Core Application ───────────────────────────────────────────────

  api:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:8010:8000"  # FreeSWITCH xml_curl (host networking needs host-accessible port)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      NP_DEBUG: "false"
      NP_LOG_LEVEL: "INFO"
      NP_CORS_ALLOWED_ORIGINS: ${NP_CORS_ALLOWED_ORIGINS:-https://ucc.aspendora.com}
      NP_SSO_CALLBACK_URL: ${NP_SSO_CALLBACK_URL:-https://ucc.aspendora.com/api/v1/auth/sso/callback}
      NP_SSO_FRONTEND_URL: ${NP_SSO_FRONTEND_URL:-https://ucc.aspendora.com}
      NP_FREESWITCH_HOST: freeswitch
      NP_PROVISIONING_SIP_SERVER: ${NP_PROVISIONING_SIP_SERVER:-ucc.aspendora.com}
      NP_PROVISIONING_BASE_URL: ${NP_PROVISIONING_BASE_URL:-https://ucc.aspendora.com}
      NP_SMTP_HOST: ""
      NP_SMTP_PORT: "587"
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend
      - backend

  web:
    restart: unless-stopped
    ports: !reset []  # Remove host port mapping — nginx proxies via Docker network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - frontend

  # ─── Data Stores ────────────────────────────────────────────────────

  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    ports: !reset []  # Remove host port mapping in production
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend

  redis:
    restart: unless-stopped
    command: >-
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 128M
    ports: !reset []  # Remove host port mapping in production
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend

  minio:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    ports: !reset []  # Remove all host ports — access via Docker network only
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend

  # ─── Telephony ──────────────────────────────────────────────────────

  freeswitch:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4096M
        reservations:
          cpus: "1.0"
          memory: 1024M
    # Ports and networks managed by base compose (network_mode: host).
    # Host networking required for WebRTC — Docker's userland proxy
    # rewrites UDP source IPs, breaking ICE connectivity checks.
    ports: !reset []
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ─── AI Engine ──────────────────────────────────────────────────────

  ai-engine:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      NP_AI_LOG_LEVEL: "INFO"
    ports: !reset []  # Remove host port mapping — internal access only via Docker network
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
      - frontend  # Needed for nginx reverse proxy access

  # ─── Rust Services ──────────────────────────────────────────────────

  sip-proxy:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/sip-proxy:${NP_VERSION:-latest}
    restart: unless-stopped
    extra_hosts:
      - "freeswitch:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 64M
    ports: !reset []  # FreeSWITCH handles SIP TLS on :5061 directly; proxy available internally for future multi-backend
    environment:
      NP_SIP_LISTEN_ADDR: 0.0.0.0:5061
      NP_SIP_TLS_CERT: /tls/sip-proxy.crt
      NP_SIP_TLS_KEY: /tls/sip-proxy.key
      NP_SIP_BACKENDS: freeswitch:5060
      NP_SIP_HEALTH_INTERVAL: "10"
      NP_SIP_LB_STRATEGY: round_robin
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    volumes:
      - ${NP_TLS_DIR:-./tls}:/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      redis:
        condition: service_healthy
      freeswitch:
        condition: service_healthy
    networks:
      - backend

  rtp-relay:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/rtp-relay:${NP_VERSION:-latest}
    restart: unless-stopped
    extra_hosts:
      - "freeswitch:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2048M
        reservations:
          cpus: "1.0"
          memory: 512M
    ports:
      - "17000-17500:17000-17500/udp"  # RTP port range (relay-managed)
    environment:
      NP_RTP_PORT_MIN: 17000
      NP_RTP_PORT_MAX: 17500
      NP_RTP_EXTERNAL_IP: ${NP_EXTERNAL_IP:-0.0.0.0}
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend

  dpma-service:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/dpma-service:${NP_VERSION:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 64M
    ports: !reset []  # No external port — phones SIP-register via sip-proxy:5061, fetch config via HTTPS
    environment:
      NP_API_URL: http://api:8000
      NP_REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  event-router:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/event-router:${NP_VERSION:-latest}
    restart: unless-stopped
    extra_hosts:
      - "freeswitch:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 64M
    environment:
      NP_ESL_HOST: freeswitch
      NP_ESL_PORT: 8021
      NP_ESL_PASSWORD: ${NP_FREESWITCH_ESL_PASSWORD:-ClueCon}
      NP_REDIS_URL: redis://redis:6379/0
      NP_API_URL: http://api:8000
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      freeswitch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  parking-manager:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/parking-manager:${NP_VERSION:-latest}
    restart: unless-stopped
    extra_hosts:
      - "freeswitch:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    environment:
      NP_PARKING_ESL_HOST: freeswitch
      NP_PARKING_ESL_PORT: 8021
      NP_PARKING_ESL_PASSWORD: ${NP_FREESWITCH_ESL_PASSWORD:-ClueCon}
      NP_PARKING_REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8084/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      freeswitch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  e911-handler:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/e911-handler:${NP_VERSION:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    environment:
      NP_API_URL: http://api:8000
      NP_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: "postgresql://new_phone_app:${NP_DB_APP_PASSWORD:-change_me_app}@postgres:5432/new_phone"
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  sms-gateway:
    image: ${NP_REGISTRY:-ghcr.io/new-phone}/sms-gateway:${NP_VERSION:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    ports:
      - "8085:8085"  # Webhook receiver for SMS provider callbacks
    environment:
      API_URL: http://api:8000
      NP_SMS_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: "postgresql://new_phone_app:${NP_DB_APP_PASSWORD:-change_me_app}@postgres:5432/new_phone"
      LOG_LEVEL: ${NP_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8086/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend

  # ─── Monitoring Stack ───────────────────────────────────────────────

  prometheus:
    restart: unless-stopped
    ports: !reset []  # Remove host port — internal only
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring
      - backend

  grafana:
    restart: unless-stopped
    ports: !reset []  # Remove host port — internal only
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring
      - frontend

  alertmanager:
    restart: unless-stopped
    ports: !reset []  # Remove host port — internal only
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  node-exporter:
    restart: unless-stopped
    ports: !reset []  # Remove host port — internal only
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  redis-exporter:
    restart: unless-stopped
    ports: !reset []  # Remove host port — internal only
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring
      - backend

  postgres-exporter:
    restart: unless-stopped
    ports: !reset []  # Remove host port — internal only
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring
      - backend

  # ─── Log Aggregation ────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    depends_on:
      loki:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - monitoring

  # Remove mailhog in production
  mailhog:
    profiles:
      - dev-only

volumes:
  pg_data:
    name: new_phone_pg_data
    labels:
      backup: "daily"
      retention: "30d"
  redis_data:
    name: new_phone_redis_data
    labels:
      backup: "daily"
      retention: "7d"
  fs_data:
    name: new_phone_fs_data
    labels:
      backup: "daily"
      retention: "30d"
  minio_data:
    name: new_phone_minio_data
    labels:
      backup: "daily"
      retention: "90d"
  recordings:
    name: new_phone_recordings
    labels:
      backup: "daily"
      retention: "365d"
  prometheus_data:
    name: new_phone_prometheus_data
    labels:
      backup: "weekly"
      retention: "30d"
  grafana_data:
    name: new_phone_grafana_data
    labels:
      backup: "weekly"
      retention: "30d"
  loki_data:
    name: new_phone_loki_data
    labels:
      backup: "weekly"
      retention: "30d"

networks:
  frontend:
    name: new_phone_frontend
    driver: bridge
  backend:
    name: new_phone_backend
    driver: bridge
  monitoring:
    name: new_phone_monitoring
    driver: bridge
    internal: true
